<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twilio WA — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2234;
    --border: #1e2d47; --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
    --green: #10b981; --red: #ef4444; --red-dim: rgba(239,68,68,0.1);
    --text: #e2e8f0; --text-dim: #64748b; --text-mid: #94a3b8;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.1) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }
  .login-wrap {
    width: 100%; max-width: 400px; padding: 16px;
  }
  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3);
    border-radius: 4px; padding: 4px 12px; font-family: var(--mono);
    font-size: 11px; color: var(--accent); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .logo-badge::before { content: '◉'; font-size: 9px; }
  .logo h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .logo h1 span { color: var(--accent); }
  .logo p { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }
  .card-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface2); display: flex; align-items: center; gap: 12px;
  }
  .card-icon {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--accent-glow); border: 1px solid rgba(59,130,246,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .card-header h2 { font-size: 15px; font-weight: 700; }
  .card-header p  { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .card-body { padding: 24px; }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 8px; }
  .toggle-pass { position: relative; }
  .toggle-pass input { padding-right: 44px; }
  .toggle-pass button { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 14px; }
  input[type=password], input[type=text] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; font-family: var(--mono);
    font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.08em;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  input.error { border-color: var(--red) !important; }

  .error-msg {
    display: none; background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #fca5a5;
    margin-bottom: 16px; align-items: center; gap: 8px;
  }
  .error-msg.visible { display: flex; }

  button.btn-login {
    width: 100%; padding: 12px; border-radius: 6px; border: none;
    background: var(--accent); color: white; font-family: var(--sans);
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s; box-shadow: 0 2px 12px rgba(59,130,246,0.3);
    letter-spacing: 0.02em;
  }
  button.btn-login:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.45); }
  button.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-badge">Twilio · WhatsApp Sender</div>
    <h1>Ativar número <span>Online</span></h1>
    <p>Acesso restrito — equipe interna</p>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon">🔐</div>
      <div>
        <h2>Autenticação</h2>
        <p>Informe a senha de acesso ao sistema</p>
      </div>
    </div>
    <div class="card-body">
      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorText">Senha incorreta. Tente novamente.</span>
      </div>

      <div class="field">
        <label>Senha de Acesso</label>
        <div class="toggle-pass">
          <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter') doLogin()">
          <button type="button" onclick="togglePass(this)">👁</button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="doLogin()">
        <span id="btnText">Entrar</span>
      </button>
    </div>
  </div>

  <p class="footer-note">Uso interno · Twilio WA Verificação v3</p>
</div>

<script>
function togglePass(btn) {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

async function doLogin() {
  const btn      = document.getElementById('btnLogin');
  const errEl    = document.getElementById('errorMsg');
  const passInp  = document.getElementById('password');
  const password = passInp.value;

  errEl.classList.remove('visible');
  passInp.classList.remove('error');

  if (!password) {
    passInp.classList.add('error');
    passInp.focus();
    return;
  }

  btn.disabled = true;
  document.getElementById('btnText').innerHTML = '<span class="spinner"></span>';

  try {
    const res  = await fetch('/api/login', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ password })
    });
    const data = await res.json();

    if (res.ok && data.success) {
      window.location.href = '/';
    } else {
      passInp.classList.add('error');
      document.getElementById('errorText').textContent = data.error || 'Senha incorreta.';
      errEl.classList.add('visible');
      btn.disabled = false;
      document.getElementById('btnText').textContent = 'Entrar';
      passInp.value = '';
      passInp.focus();
    }
  } catch (err) {
    document.getElementById('errorText').textContent = 'Erro de conexão. Tente novamente.';
    errEl.classList.add('visible');
    btn.disabled = false;
    document.getElementById('btnText').textContent = 'Entrar';
  }
}

document.getElementById('password').focus();
</script>
</body>
</html>
